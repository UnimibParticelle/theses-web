<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposte Tesi - Fisica delle Particelle UNIMIB</title>
    <meta
      name="description"
      content="Catalogo navigabile delle proposte di tesi in Fisica delle Particelle, alimentato da Google Sheets."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header">
      <p class="eyebrow">UNIMIB Fisica delle Particelle</p>
      <div class="title-row">
        <img class="site-logo" src="./logo_unimib.png" alt="Logo UNIMIB" width="56" height="56" />
        <h1>Proposte di tesi in Fisica delle Particelle</h1>
      </div>
      <p class="subtitle">Esplora, filtra e trova rapidamente il tema più adatto.</p>
    </header>

    <main class="layout">
      <aside class="panel controls-panel">
        <h2>Filtri</h2>

        <label for="searchInput">Cerca per titolo, docente o parole chiave</label>
        <input id="searchInput" type="search" placeholder="Es. LHC, machine learning..." />

        <label for="levelFilter">Livello</label>
        <select id="levelFilter">
          <option value="">Tutti</option>
        </select>

        <label for="topicFilter">Argomento</label>
        <select id="topicFilter">
          <option value="">Tutti</option>
        </select>

        <label for="professorFilter">Docente</label>
        <select id="professorFilter">
          <option value="">Tutti</option>
        </select>

        <label for="experimentFilter">Esperimento</label>
        <select id="experimentFilter">
          <option value="">Tutti</option>
        </select>

        <div class="actions-row">
          <button id="clearFiltersBtn" type="button">Azzera filtri</button>
          <span id="resultsCount" aria-live="polite"></span>
        </div>
      </aside>

      <section class="panel list-panel">
        <div id="statusMessage" class="status">Caricamento proposte...</div>
        <ul id="thesisList" class="thesis-list"></ul>
      </section>

      <section class="panel detail-panel">
        <div id="detailEmpty" class="detail-empty">Seleziona una proposta dalla lista.</div>
        <article id="thesisDetail" class="detail hidden"></article>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
